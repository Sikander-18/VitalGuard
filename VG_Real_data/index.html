<!DOCTYPE html>
<html>
<head>
  <title>VitalGuard Dashboard</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      margin-top: 30px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .hr { background: #ef4444; color: white; }
    .spo2 { background: #3b82f6; color: white; }
    .bp { background: #22c55e; color: white; }

    .card {
      margin: 20px auto;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .value {
      font-size: 32px;
      font-weight: bold;
    }

    .label {
      font-size: 14px;
      opacity: 0.7;
    }

    #mode {
      margin-top: 20px;
      font-size: 18px;
      color: #facc15;
    }

  </style>
</head>

<body>

<h1>VitalGuard Dashboard 💀</h1>

<div class="container">
  <button class="hr" onclick="setMode('HR')">❤️ Heart Rate</button>
  <button class="spo2" onclick="setMode('SPO2')">🫁 SpO2</button>
  <button class="bp" onclick="setMode('BP')">🩸 BP</button>
</div>

<h2 id="mode">Mode: None</h2>

<div class="container">

  <div class="card">
    <div class="label">Heart Rate</div>
    <div class="value" id="hr">--</div>
  </div>

  <div class="card">
    <div class="label">SpO2</div>
    <div class="value" id="spo2">--</div>
  </div>

  <div class="card">
    <div class="label">Blood Pressure</div>
    <div class="value" id="bp">--</div>
  </div>

</div>

<script>

// 🔥 SET MODE (you manually trigger watch after this)
async function setMode(mode) {
  try {
    await fetch("http://127.0.0.1:5000/set-mode", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ mode: mode })
    });

    document.getElementById("mode").innerText = "Mode: " + mode;

  } catch (err) {
    console.error(err);
  }
}


// 🔥 FETCH LIVE DATA
async function fetchData() {
  try {
    let res = await fetch("http://127.0.0.1:5000/data");
    let data = await res.json();

    document.getElementById("hr").innerText = data.HR || "--";
    document.getElementById("spo2").innerText = data.SPO2 || "--";
    document.getElementById("bp").innerText = data.BP || "--";

  } catch (err) {
    console.error("Fetch error:", err);
  }
}

// update every 2 sec
setInterval(fetchData, 2000);

</script>

</body>
</html>
